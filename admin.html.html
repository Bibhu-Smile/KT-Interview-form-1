<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard – KT Interview Submissions</title>
    <style>
        /* ── Screen styles ── */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background: #eef2f7;
            padding: 24px;
        }
        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            padding: 28px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.06);
        }
        h1 { display: flex; align-items: center; gap: 12px; color: #1a5276; font-size: 26px; margin-bottom: 20px; }
        .actions { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
        .actions button {
            background: #1a5276;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }
        .actions button:hover { background: #154360; }
        .actions .export { background: #1e8449; }
        .actions .export:hover { background: #196f3d; }
        .loading { text-align: center; padding: 40px; color: #5d6d7e; }
        .table-wrap { overflow-x: auto; }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 1000px;
        }
        th { background: #1a5276; color: white; padding: 12px 10px; text-align: left; position: sticky; top: 0; z-index: 5; }
        td { padding: 10px; border-bottom: 1px solid #e5eaef; vertical-align: top; }
        tr:hover { background: #f4f8fc; }
        .btn-print { background: #2c3e50; color: white; border: none; padding: 5px 14px; border-radius: 30px; font-size: 12px; cursor: pointer; }
        .btn-print:hover { background: #1a2a3a; }
        .photo-thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; border: 1px solid #dce4ec; }

        /* ── Error box ── */
        .error-box { color: #c0392b; padding: 20px; background: #fde8e8; border-radius: 8px; border-left: 4px solid #c0392b; margin: 20px 0; }
        .error-box code { background: #fff; padding: 2px 6px; border-radius: 4px; font-size: 12px; }

        /* ── Debug preview (visible only when debugging) ── */
        .debug-preview { background: #f0f0f0; padding: 20px; margin: 20px 0; border: 2px dashed #666; overflow: auto; max-height: 500px; display: none; }

        /* ── PRINT STYLES ── */
        @page { size: A4 portrait; margin: 0.7in 0.6in; }

        @media print {
            body, body * { display: none !important; }
            body .print-biodata,
            body .print-biodata * { display: block !important; }
            body .print-biodata table,
            body .print-biodata table * { display: table !important; }
            body .print-biodata table tr { display: table-row !important; }
            body .print-biodata table td,
            body .print-biodata table th { display: table-cell !important; }

            .print-biodata {
                display: block !important;
                padding: 0 !important;
                font-family: 'Times New Roman', Times, serif !important;
                font-size: 11pt !important;
                background: white !important;
                color: #000 !important;
            }
            .print-biodata table {
                border-collapse: collapse !important;
                width: 100% !important;
                border: 1px solid #000 !important;
                font-size: 10pt !important;
            }
            .print-biodata table td,
            .print-biodata table th {
                border: 1px solid #000 !important;
                padding: 3px 5px !important;
                text-align: left !important;
                vertical-align: top !important;
            }
            .print-biodata table th { background: #d4e6f1 !important; font-weight: 700 !important; }
            .print-biodata .header-table { border: 2px solid #000 !important; width: 100% !important; }
            .print-biodata .header-table td { border: 1px solid #000 !important; padding: 6px 10px !important; vertical-align: middle !important; text-align: center !important; }
            .print-biodata .logo-cell { width: 12% !important; text-align: center !important; }
            .print-biodata .logo-cell img { max-width: 70px !important; max-height: 70px !important; display: block !important; margin: 0 auto !important; }
            .print-biodata .center-cell { width: 68% !important; text-align: center !important; }
            .print-biodata .photo-cell { width: 20% !important; text-align: center !important; }
            .print-biodata .photo-cell img { max-width: 100px !important; max-height: 120px !important; border: 2px solid #000 !important; display: block !important; margin: 0 auto !important; }
            .print-biodata .school-name { font-size: 18pt !important; font-weight: 700 !important; color: #1a5276 !important; }
            .print-biodata .school-details { font-size: 9pt !important; }
            .print-biodata .form-title { font-size: 14pt !important; font-weight: 700 !important; text-align: center !important; background: #eaf2f8 !important; padding: 4px 0 !important; border: 1px solid #000 !important; border-top: none !important; }
            .print-biodata .section-title { font-weight: 700 !important; font-size: 12pt !important; background: #d4e6f1 !important; padding: 2px 6px !important; border: 1px solid #000 !important; margin-top: 6px !important; }
            .print-biodata .field-row { display: table !important; width: 100% !important; border-bottom: 1px solid #cfcfcf !important; }
            .print-biodata .field-label, .print-biodata .field-value { display: table-cell !important; padding: 3px 5px !important; vertical-align: top !important; }
            .print-biodata .field-label { width: 35% !important; font-weight: 700 !important; }
            .print-biodata .field-value { width: 65% !important; }
            .print-biodata .declaration { margin-top: 12px !important; border-top: 2px solid #000 !important; padding-top: 8px !important; }
            .print-biodata .signature-row { display: flex !important; justify-content: space-between !important; margin-top: 14px !important; }
            tr, td, th { page-break-inside: avoid !important; break-inside: avoid !important; }
        }

        .print-biodata { display: none; }
    </style>
</head>
<body>

    <div class="dashboard" id="app">
        <h1>📋 KT Global School – Interview Submissions</h1>
        <div class="actions no-print">
            <button onclick="fetchData()">🔄 Refresh</button>
            <button class="export" onclick="exportCSV()">📥 Export CSV</button>
        </div>
        <div id="tableContainer">
            <div class="loading">⏳ Loading submissions...</div>
        </div>
        <div id="debugPreview" class="debug-preview"></div>
    </div>

    <div id="printContainer" class="print-biodata"></div>

    <script>
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  CONFIGURATION
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        const CSV_URL =
            'https://docs.google.com/spreadsheets/d/e/2PACX-1vTYGbGLv_LorKD3-SYVo4WhuZVT1L5yrrddirKk5mGcH6FeUlGrGVRbVPpKlcQ53O-4kkZhBRicMiN9/pub?output=csv';

        const LOGO_FILENAME = 'kt-logo.webp';

        let allData = [];
        let logoBase64 = '';

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  LOGGING
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        function log(msg) { console.log(msg); }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  load logo
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        async function loadLogoAsBase64() {
            try {
                const resp = await fetch(LOGO_FILENAME);
                if (!resp.ok) throw new Error('Logo not found');
                const blob = await resp.blob();
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = reject;
                    reader.readAsDataURL(blob);
                });
            } catch (_) {
                console.warn('Logo not loaded');
                return null;
            }
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  CSV PARSER
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        function parseCSV(csvText) {
            const lines = csvText.split('\n').filter(line => line.trim() !== '');
            if (lines.length === 0) return [];
            const headers = lines[0].split(',').map(h => h.trim());
            const data = [];
            for (let i = 1; i < lines.length; i++) {
                const values = lines[i].split(',').map(v => v.trim());
                const obj = {};
                headers.forEach((h, idx) => obj[h] = values[idx] || '');
                data.push(obj);
            }
            return data;
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  FETCH DATA
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        async function fetchData() {
            const container = document.getElementById('tableContainer');
            container.innerHTML = '<div class="loading">⏳ Loading...</div>';
            try {
                log('Fetching CSV...');
                const response = await fetch(CSV_URL);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const csvText = await response.text();
                const data = parseCSV(csvText);
                allData = data;
                log('Parsed ' + data.length + ' rows');
                if (data.length === 0) {
                    container.innerHTML = '<div style="padding:30px;text-align:center;color:#5d6d7e;">📭 No submissions yet.</div>';
                    return;
                }
                renderTable(data);
            } catch (err) {
                log('Error: ' + err.message);
                container.innerHTML = `<div class="error-box"><strong>❌ Error: ${err.message}</strong><br><code>${CSV_URL}</code></div>`;
            }
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  RENDER TABLE
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        function renderTable(data) {
            const container = document.getElementById('tableContainer');
            const headers = Object.keys(data[0]);
            const hideCols = ['Permanent Address', 'Communication Address', 'Achievements', 'PhotoLink'];
            const displayHeaders = headers.filter(h => !hideCols.includes(h));
            let html = '<div class="table-wrap"><table><thead><tr>';
            displayHeaders.forEach(h => html += `<th>${h}</th>`);
            html += `<th>Photo</th><th>Action</th></tr></thead><tbody>`;
            data.forEach((row, idx) => {
                html += `<tr>`;
                displayHeaders.forEach(h => {
                    let val = row[h] || '';
                    if (val.length > 30) val = val.substring(0, 30) + '…';
                    html += `<td>${val}</td>`;
                });
                const photoUrl = row['PhotoLink'] || '';
                html += `<td>${photoUrl ? `<img src="${photoUrl}" class="photo-thumb" alt="photo">` : '—'}</td>`;
                html += `<td><button class="btn-print" onclick="printBiodata(${idx})">🖨️ Print PDF</button></td>`;
                html += `</tr>`;
            });
            html += '</tbody></table></div>';
            container.innerHTML = html;
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  PRINT BIODATA (with debugging)
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        function printBiodata(index) {
            const row = allData[index];
            if (!row) { alert('Data not found'); return; }

            const container = document.getElementById('printContainer');
            const debugDiv = document.getElementById('debugPreview');

            // Build the HTML (same as before)
            const logoSrc = logoBase64 || LOGO_FILENAME;
            const logoHtml =
                `<img src="${logoSrc}" alt="KTGS Logo" style="max-width:70px;max-height:70px;display:block;margin:0 auto;" onerror="this.outerHTML='<span style=\\'font-size:32px;font-weight:700;color:#1a5276;\\'>KTGS</span>'">`;

            let photoHtml = '';
            if (row['PhotoLink']) {
                photoHtml = `<img src="${row['PhotoLink']}" alt="Passport Photo" 
                                style="max-width:100px;max-height:120px;border:2px solid #000;display:block;margin:0 auto;object-fit:contain;"
                                crossorigin="anonymous" 
                                referrerpolicy="no-referrer"
                                onerror="this.outerHTML='<div style=\\'width:100px;height:120px;border:2px solid #000;display:flex;align-items:center;justify-content:center;font-size:10px;color:#999;background:#f9f9f9;margin:0 auto;\\'>📷<br>No Photo</div>'">`;
            } else {
                photoHtml = `<div style="width:100px;height:120px;border:2px solid #000;display:flex;align-items:center;justify-content:center;font-size:10px;color:#999;background:#f9f9f9;margin:0 auto;">📷<br>No Photo</div>`;
            }

            const safe = (val) => val || '';
            const name = safe(row['Name']);
            const father = safe(row['Father/Husband']);
            const dob = safe(row['DOB']);
            const age = safe(row['Age']);
            const bloodGroup = safe(row['Blood Group']);
            const category = safe(row['Category']);
            const religion = safe(row['Religion']);
            const nationality = safe(row['Nationality']);
            const gender = safe(row['Gender']);
            const marital = safe(row['Marital Status']);
            const hobbies = safe(row['Hobbies']);
            const permAddr = safe(row['Permanent Address']);
            const commAddr = safe(row['Communication Address']);
            const mobile = safe(row['Mobile']);
            const email = safe(row['Email']);
            const aadhaar = safe(row['Aadhaar']);
            const pan = safe(row['PAN']);
            const postCategory = safe(row['Post Category']);
            const postApplied = safe(row['Post Applied']);
            let displayPost = postApplied;
            if (postCategory) displayPost = postApplied + ' (' + postCategory + ')';

            const secYr = safe(row['Secondary_Yr']);
            const secSub = safe(row['Secondary_Subj']);
            const secBoard = safe(row['Secondary_Board']);
            const secMarks = safe(row['Secondary_Marks']);
            const srSecYr = safe(row['SrSec_Yr']);
            const srSecSub = safe(row['SrSec_Subj']);
            const srSecBoard = safe(row['SrSec_Board']);
            const srSecMarks = safe(row['SrSec_Marks']);
            const gradYr = safe(row['Graduation_Yr']);
            const gradSub = safe(row['Graduation_Subj']);
            const gradBoard = safe(row['Graduation_Board']);
            const gradMarks = safe(row['Graduation_Marks']);
            const pgYr = safe(row['PostGrad_Yr']);
            const pgSub = safe(row['PostGrad_Subj']);
            const pgBoard = safe(row['PostGrad_Board']);
            const pgMarks = safe(row['PostGrad_Marks']);
            const bedYr = safe(row['BEd_Yr']);
            const bedSub = safe(row['BEd_Subj']);
            const bedBoard = safe(row['BEd_Board']);
            const bedMarks = safe(row['BEd_Marks']);
            const tetYr = safe(row['TET_Yr']);
            const tetSub = safe(row['TET_Subj']);
            const tetBoard = safe(row['TET_Board']);
            const tetMarks = safe(row['TET_Marks']);
            const extra1 = safe(row['Extra_Q1']);
            const extra2 = safe(row['Extra_Q2']);
            const extra3 = safe(row['Extra_Q3']);
            const schools = (safe(row['WorkExp1']) || '').split(' || ');
            const desigs = (safe(row['WorkExp2']) || '').split(' || ');
            let workRowsHtml = '';
            for (let i = 0; i < 3; i++) {
                workRowsHtml += `<tr><td>${schools[i] || ''}</td><td>${desigs[i] || ''}</td><td></td><td></td><td></td><td></td></tr>`;
            }
            const teach = safe(row['TotalTeaching']);
            const admin = safe(row['TotalAdmin']);
            const other = safe(row['TotalOther']);
            const achievements = safe(row['Achievements']);
            const currentSalary = safe(row['CurrentSalary']);
            const salary = safe(row['ExpectedSalary']);
            const joining = safe(row['JoiningTime']);
            const transportation = safe(row['Transportation']);
            let formattedDate = '';
            if (row['Timestamp']) {
                try {
                    const d = new Date(row['Timestamp']);
                    formattedDate = d.toLocaleDateString('en-IN', { day: '2-digit', month: '2-digit', year: 'numeric' });
                } catch (_) {}
            }

            const html = `
                <table class="header-table">
                    <tr>
                        <td class="logo-cell" rowspan="2">${logoHtml}</td>
                        <td class="center-cell">
                            <div class="school-name">KT GLOBAL SCHOOL</div>
                            <div class="school-details">Telephone No.: +91 90901 11177 &nbsp;|&nbsp; E-mail ID: info@ktglobalschool.org</div>
                            <div class="school-details">Address: Plot No. F/12, IID Centre, Barunei, Khordha, Odisha - 752057</div>
                        </td>
                        <td class="photo-cell" rowspan="2">
                            ${photoHtml}
                            <div style="font-size:8pt;margin-top:2px;font-weight:600;">Affix Passport<br>size Photograph</div>
                        </td>
                    </tr>
                    <tr>
                        <td class="form-title" colspan="1">INTERVIEW BIODATA FORM</td>
                    </tr>
                </table>

                <div class="post-applied" style="font-size:12pt;font-weight:600;margin:4px 0;">
                    <strong>Post applied for:</strong> <span style="font-weight:400;">${displayPost || '___________'}</span>
                </div>

                <div class="section-title">1. General Information: (TO BE FILLED IN CAPITAL LETTERS ONLY)</div>
                <div class="field-row"><span class="field-label">Name of the Applicant:</span><span class="field-value">${name}</span></div>
                <div class="field-row"><span class="field-label">Father or Husband Name:</span><span class="field-value">${father}</span></div>
                <div class="field-row"><span class="field-label">D.O.B.:</span><span class="field-value">${dob}</span></div>
                <div class="field-row"><span class="field-label">Age as on 1st Jan 2026:</span><span class="field-value">${age}</span></div>
                <div class="field-row"><span class="field-label">Blood Group:</span><span class="field-value">${bloodGroup}</span></div>
                <div class="field-row"><span class="field-label">Category:</span><span class="field-value">${category}</span></div>
                <div class="field-row"><span class="field-label">Religion:</span><span class="field-value">${religion}</span></div>
                <div class="field-row"><span class="field-label">Nationality:</span><span class="field-value">${nationality}</span></div>
                <div class="field-row"><span class="field-label">Gender:</span><span class="field-value">${gender}</span></div>
                <div class="field-row"><span class="field-label">Marital Status:</span><span class="field-value">${marital}</span></div>
                <div class="field-row"><span class="field-label">Hobbies:</span><span class="field-value">${hobbies}</span></div>
                <div class="field-row"><span class="field-label">Permanent Address:</span><span class="field-value">${permAddr}</span></div>
                <div class="field-row"><span class="field-label">Address of Communication:</span><span class="field-value">${commAddr}</span></div>
                <div class="field-row"><span class="field-label">Mobile No.:</span><span class="field-value">${mobile}</span></div>
                <div class="field-row"><span class="field-label">E-mail ID:</span><span class="field-value">${email}</span></div>
                <div class="field-row"><span class="field-label">Aadhaar No.:</span><span class="field-value">${aadhaar}</span></div>
                <div class="field-row"><span class="field-label">PAN No.:</span><span class="field-value">${pan}</span></div>

                <div class="section-title">2. Educational Qualifications:</div>
                <table class="edu-table">
                    <tr><th>Qualification</th><th>Year of Passing</th><th>Subjects Offered</th><th>Name of Board or University</th><th>Total Mark in Percentage/CGPA</th></tr>
                    <tr><td>Secondary</td><td>${secYr}</td><td>${secSub}</td><td>${secBoard}</td><td>${secMarks}</td></tr>
                    <tr><td>Senior Secondary</td><td>${srSecYr}</td><td>${srSecSub}</td><td>${srSecBoard}</td><td>${srSecMarks}</td></tr>
                    <tr><td>Graduation (Mention Hons. Subject)</td><td>${gradYr}</td><td>${gradSub}</td><td>${gradBoard}</td><td>${gradMarks}</td></tr>
                    <tr><td>Post Graduation</td><td>${pgYr}</td><td>${pgSub}</td><td>${pgBoard}</td><td>${pgMarks}</td></tr>

        //  EXPORT CSV
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        function exportCSV() {
            if (!allData || allData.length === 0) { alert('No data to export.'); return; }
            const headers = Object.keys(allData[0]);
            let csv = headers.join(',') + '\n';
            allData.forEach(row => {
                const values = headers.map(h => {
                    let val = (row[h] || '').toString();
                    if (val.includes(',') || val.includes('"') || val.includes('\n')) {
                        val = '"' + val.replace(/"/g, '""') + '"';
                    }
                    return val;
                });
                csv += values.join(',') + '\n';
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `KT_Submissions_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
            URL.revokeObjectURL(link.href);
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

                document.getElementById('tableContainer').innerHTML = `
                    <div class="error-box"><strong>❌ Fatal Error: ${err.message}</strong><pre>${err.stack || ''}</pre></div>`;
            }
        })();
    </script>
