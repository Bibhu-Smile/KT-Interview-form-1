<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard – KT Interview Submissions</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/3.1.4/papaparse.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background: #eef2f7;
            padding: 24px;
        }
        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            padding: 28px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.06);
        }
        h1 { display: flex; align-items: center; gap: 12px; color: #1a5276; font-size: 26px; margin-bottom: 20px; }
        .actions { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
        .actions button {
            background: #1a5276;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }
        .actions button:hover { background: #154360; }
        .actions .export { background: #1e8449; }
        .actions .export:hover { background: #196f3d; }
        .loading { text-align: center; padding: 40px; color: #5d6d7e; }
        .table-wrap { overflow-x: auto; }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 1000px;
        }
        th {
            background: #1a5276;
            color: white;
            padding: 12px 10px;
            text-align: left;
            position: sticky;
            top: 0;
            z-index: 5;
        }
        td {
            padding: 10px;
            border-bottom: 1px solid #e5eaef;
            vertical-align: top;
        }
        tr:hover { background: #f4f8fc; }
        .btn-print {
            background: #2c3e50;
            color: white;
            border: none;
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 12px;
            cursor: pointer;
        }
        .btn-print:hover { background: #1a2a3a; }
        .photo-thumb {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #dce4ec;
        }
        .resume-link { color: #1a5276; text-decoration: none; font-weight: 600; }
        .resume-link:hover { text-decoration: underline; }
        .error-box { color: #c0392b; padding: 20px; background: #fde8e8; border-radius: 8px; border-left: 4px solid #c0392b; margin: 20px 0; }
        .error-box code { background: #fff; padding: 2px 6px; border-radius: 4px; font-size: 12px; }

        .debug-info {
            background: #f0f0f0;
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 13px;
            margin: 10px 0;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="dashboard" id="app">
        <h1>📋 KT Global School – Interview Submissions</h1>
        <div class="actions no-print">
            <button onclick="fetchData()">🔄 Refresh</button>
            <button class="export" onclick="exportCSV()">📥 Export CSV</button>
        </div>
        <div id="tableContainer">
            <div class="loading">⏳ Loading submissions...</div>
        </div>
        <div id="debugInfo" class="debug-info" style="display:none;"></div>
    </div>

    <script>
        // ── CONFIGURATION ──
        // Updated CSV URL - from your screenshot
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTYGbGLv_LorKD3-SYVo4WhuZVT1L5yrrddirKk5mGcH6FeUlGrGVRbVPpKlcQ53O-4kkZhBRicMiN9/pub?output=csv';
        const LOGO_URL = 'https://raw.githubusercontent.com/Bibhu-Smile/KT-Interview-form-1/main/kt-logo.webp';

        let allData = [];
        let headers = [];
        let logoBase64 = '';

        // ── Load logo as base64 ──
        async function loadLogoAsBase64() {
            try {
                const resp = await fetch(LOGO_URL);
                if (!resp.ok) throw new Error('Logo not found');
                const blob = await resp.blob();
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = reject;
                    reader.readAsDataURL(blob);
                });
            } catch (_) { return null; }
        }

        // ── CSV Parser ──
        function parseCSV(csvText) {
            const lines = csvText.split('\n').filter(line => line.trim() !== '');
            if (lines.length === 0) return [];
            const headerRow = lines[0].split(',').map(h => h.trim());
            headers = headerRow;
            const data = [];
            for (let i = 1; i < lines.length; i++) {
                const values = lines[i].split(',').map(v => v.trim());
                const obj = {};
                headerRow.forEach((h, idx) => obj[h] = values[idx] || '');
                data.push(obj);
            }
            return data;
        }

        // ── Fetch data ──
        async function fetchData() {
            const container = document.getElementById('tableContainer');
            container.innerHTML = '<div class="loading">⏳ Loading...</div>';
            try {
                console.log('📥 Fetching CSV from:', CSV_URL);
                const response = await fetch(CSV_URL);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                const csvText = await response.text();
                console.log('📄 CSV length:', csvText.length);
                const data = parseCSV(csvText);
                allData = data;
                console.log('✅ Data loaded. Headers:', headers);
                console.log('✅ Sample row:', data.length > 0 ? data[0] : 'No data');

                const debugDiv = document.getElementById('debugInfo');
                debugDiv.textContent = '📋 CSV Headers:\n' + JSON.stringify(headers, null, 2);
                debugDiv.style.display = 'block';

                if (data.length === 0) {
                    container.innerHTML = '<div style="padding:30px;text-align:center;color:#5d6d7e;">📭 No submissions yet.</div>';
                    return;
                }
                renderTable(data);
            } catch (err) {
                console.error('❌ Fetch error:', err);
                container.innerHTML = `
                    <div class="error-box">
                        <strong>❌ Error: ${err.message}</strong><br><br>
                        <strong>Please check:</strong><br>
                        1. The CSV URL is correct and accessible.<br>
                        2. Your sheet is published: <strong>File → Share → Publish to web</strong>.<br>
                        3. Try opening this URL directly in your browser:<br>
                        <code style="font-size:11px;word-break:break-all;">${CSV_URL}</code>
                    </div>
                `;
            }
        }

        // ── Render table ──
        function renderTable(data) {
            const container = document.getElementById('tableContainer');
            const displayHeaders = headers.filter(h => !['Permanent Address', 'Communication Address', 'Achievements', 'PhotoLink', 'ResumeLink'].includes(h));

            let html = '<div class="table-wrap"><table><thead><tr>';
            displayHeaders.forEach(h => html += `<th>${h}</th>`);
            html += `<th>Photo</th><th>Resume</th><th>Action</th></tr></thead><tbody>`;

            data.forEach((row, idx) => {
                html += `<tr>`;
                displayHeaders.forEach(h => {
                    let val = row[h] || '';
                    if (val.length > 30) val = val.substring(0, 30) + '…';
                    html += `<td>${val}</td>`;
                });
                const photoUrl = row['PhotoLink'] || '';
                html += `<td>${photoUrl ? `<img src="${photoUrl}" class="photo-thumb" alt="photo" crossorigin="anonymous" referrerpolicy="no-referrer">` : '—'}</td>`;
                const resumeUrl = row['ResumeLink'] || '';
                html += `<td>${resumeUrl ? `<a href="${resumeUrl}" target="_blank" class="resume-link">📄 View</a>` : '—'}</td>`;
                html += `<td><button class="btn-print" onclick="printBiodata(${idx})">🖨️ Print PDF</button></td>`;
                html += `</tr>`;
            });
            html += '</tbody></table></div>';
            container.innerHTML = html;
        }

        // ── Helper: get field ──
        function getField(row, keys) {
            for (let key of keys) {
                if (row[key] !== undefined && row[key] !== null && row[key] !== '') return row[key];
            }
            return '';
        }

        // ── Print Biodata ──
        function printBiodata(index) {
            const row = allData[index];
            if (!row) { alert('Data not found.'); return; }

            const field = (keys) => getField(row, Array.isArray(keys) ? keys : [keys]);

            // Logo
            let logoHtml = logoBase64
                ? `<img src="${logoBase64}" alt="KTGS Logo" style="max-width:70px;max-height:70px;display:block;margin:0 auto;">`
                : `<span style="font-size:32px;font-weight:700;color:#1a5276;">KTGS</span>`;

            // Photo
            let photoHtml = '';
            const photoUrl = field(['PhotoLink', 'Photo Url', 'Photo URL']);
            photoHtml = photoUrl
                ? `<img src="${photoUrl}" alt="Passport Photo" style="max-width:100px;max-height:120px;border:2px solid #000;display:block;margin:0 auto;object-fit:contain;" onerror="this.outerHTML='<div style=\\'width:100px;height:120px;border:2px solid #000;display:flex;align-items:center;justify-content:center;font-size:10px;color:#999;background:#f9f9f9;margin:0 auto;\\'>📷<br>No Photo</div>'">`
                : `<div style="width:100px;height:120px;border:2px solid #000;display:flex;align-items:center;justify-content:center;font-size:10px;color:#999;background:#f9f9f9;margin:0 auto;">📷<br>No Photo</div>`;

            // ── All fields with fallback keys ──
            const name = field(['Name', 'Name of Applicant', 'Applicant Name']);
            const father = field(['Father/Husband', 'Father Name', 'Husband Name']);
            const dob = field(['DOB', 'Date of Birth', 'D.O.B.']);
            const age = field(['Age', 'Age as on 1st Jan 2026']);
            const bloodGroup = field(['Blood Group']);
            const category = field(['Category']);
            const religion = field(['Religion']);
            const nationality = field(['Nationality']);
            const gender = field(['Gender']);
            const marital = field(['Marital Status']);
            const hobbies = field(['Hobbies']);
            const permAddr = field(['Permanent Address']);
            const commAddr = field(['Communication Address', 'Address of Communication']);
            const mobile = field(['Mobile', 'Mobile No.', 'Mobile Number']);
            const email = field(['Email', 'E-mail ID', 'Email ID']);
            const aadhaar = field(['Aadhaar', 'Aadhaar No.']);
            const pan = field(['PAN', 'PAN No.']);
            const postApplied = field(['Post Applied', 'Post Applied For']);
            const postCategory = field(['Post Category']);

            // Education
            const secYr = field(['Secondary_Yr', 'Secondary Year']);
            const secSub = field(['Secondary_Subj', 'Secondary Subjects']);
            const secBoard = field(['Secondary_Board', 'Secondary Board']);
            const secMarks = field(['Secondary_Marks', 'Secondary Marks']);
            const srSecYr = field(['SrSec_Yr', 'SrSec Year', 'Senior Secondary Year']);
            const srSecSub = field(['SrSec_Subj', 'SrSec Subjects']);
            const srSecBoard = field(['SrSec_Board', 'SrSec Board']);
            const srSecMarks = field(['SrSec_Marks', 'SrSec Marks']);
            const gradYr = field(['Graduation_Yr', 'Graduation Year']);
            const gradSub = field(['Graduation_Subj', 'Graduation Subjects']);
            const gradBoard = field(['Graduation_Board', 'Graduation Board']);
            const gradMarks = field(['Graduation_Marks', 'Graduation Marks']);
            const pgYr = field(['PostGrad_Yr', 'PostGrad Year', 'Post Graduation Year']);
            const pgSub = field(['PostGrad_Subj', 'PostGrad Subjects']);
            const pgBoard = field(['PostGrad_Board', 'PostGrad Board']);
            const pgMarks = field(['PostGrad_Marks', 'PostGrad Marks']);
            const bedYr = field(['BEd_Yr', 'BEd Year', 'B.Ed Year']);
            const bedSub = field(['BEd_Subj', 'BEd Subjects']);
            const bedBoard = field(['BEd_Board', 'BEd Board']);
            const bedMarks = field(['BEd_Marks', 'BEd Marks']);
            const tetYr = field(['TET_Yr', 'TET Year']);
            const tetSub = field(['TET_Subj', 'TET Subjects']);
            const tetBoard = field(['TET_Board', 'TET Board']);
            const tetMarks = field(['TET_Marks', 'TET Marks']);

            const extra1 = field(['Extra_Q1', 'Extra Qualification 1']);
            const extra2 = field(['Extra_Q2', 'Extra Qualification 2']);
            const extra3 = field(['Extra_Q3', 'Extra Qualification 3']);

            const work1 = field(['WorkExp1', 'Work Experience 1']);
            const work2 = field(['WorkExp2', 'Work Experience 2']);
            const work3 = field(['WorkExp3', 'Work Experience 3']);

            const schools = (work1 || '').split(' || ').filter(s => s);
            const desigs = (work2 || '').split(' || ').filter(s => s);
            let workRowsHtml = '';
            for (let i = 0; i < 3; i++) {
                workRowsHtml += `<tr><td>${schools[i] || ''}</td><td>${desigs[i] || ''}</td><td></td><td></td><td></td><td></td></tr>`;
            }

            const teach = field(['TotalTeaching', 'Teaching Experience']);
            const admin = field(['TotalAdmin', 'Admin Experience']);
            const other = field(['TotalOther', 'Other Experience']);
            const achievements = field(['Achievements']);
            const currentSalary = field(['CurrentSalary', 'Current Salary']);
            const salary = field(['ExpectedSalary', 'Expected Salary', 'Minimum Salary Expected']);
            const joining = field(['JoiningTime', 'Time needed to join']);
            const transportation = field(['Transportation']);

            let displayPost = postApplied;
            if (postCategory) displayPost = postApplied + ' (' + postCategory + ')';

            let formattedDate = '';
            const ts = row['Timestamp'] || row['Date'] || '';
            if (ts) {
                try { const d = new Date(ts); formattedDate = d.toLocaleDateString('en-IN', { day:'2-digit', month:'2-digit', year:'numeric' }); } catch (_) {}
            }

            const printContent = `
            <!DOCTYPE html>
            <html>

                    tr, td, th { page-break-inside: avoid; break-inside: avoid; }

                    <div class="section-title">4. Work Experience:</div>

                    <div class="total-exp">

                    <div class="section-title">5. Achievement if any:</div>

                        <tr><td>2</td><td>Art &amp; Craft</td><td>${achievements && achievements.toLowerCase().includes('art') ? '✓' : ''}</td></tr>
                        <tr><td>3</td><td>Sports</td><td>${achievements && achievements.toLowerCase().includes('sport') ? '✓' : ''}</td></tr>
                        <tr><td>4</td><td>Cultural Activity, Music &amp; Dance</td><td>${achievements && (achievements.toLowerCase().includes('cultural') || achievements.toLowerCase().includes('music') || achievements.toLowerCase().includes('dance')) ? '✓' : ''}</td></tr>
                        <tr><td colspan="3" style="font-weight:600;">Details: ${achievements}</td></tr>
                    </table>

                    <div class="section-title">6. Salary & Other Details</div>
                    <div class="field-row"><span class="field-label">Current Salary (Rs. per month):</span><span class="field-value">${currentSalary || '___________'}</span></div>
                    <div class="field-row"><span class="field-label">Expected Salary Rs.</span><span class="field-value">${salary || '___________'} (Per Month)</span></div>
                    <div class="field-row"><span class="field-label">Time needed to join (days):</span><span class="field-value">${joining || '___________'}</span></div>
                    <div class="field-row"><span class="field-label">Transportation:</span><span class="field-value">${transportation || '___________'}</span></div>

                    <div class="declaration">
                        <p><strong>19. Declaration.</strong></p>

                        <div class="signature-row">
                            <span><strong>Date:</strong> ${formattedDate || '___________'}</span>
                            <span><strong>Place:</strong> Khordha</span>
                            <span><strong>Full Signature of the Employee:</strong> _________________</span>
                        </div>
                    </div>
                </div>
            </body>
            </html>
            `;

            const printWindow = window.open('', '_blank', 'width=800,height=600');
            if (!printWindow) { alert('Please allow pop-ups.'); return; }
            printWindow.document.write(printContent);
            printWindow.document.close();
            setTimeout(() => { printWindow.focus(); printWindow.print(); }, 800);
        }

        // ── Export CSV ──
        function exportCSV() {
            if (!allData || allData.length === 0) { alert('No data to export.'); return; }
            const hdr = headers.length ? headers : Object.keys(allData[0]);
            let csv = hdr.join(',') + '\n';
            allData.forEach(row => {
                const values = hdr.map(h => {
                    let val = (row[h] || '').toString();
                    if (val.includes(',') || val.includes('"') || val.includes('\n')) {
                        val = '"' + val.replace(/"/g, '""') + '"';
                    }
                    return val;
                });
                csv += values.join(',') + '\n';
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `KT_Submissions_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
            URL.revokeObjectURL(link.href);
        }

        // ── INIT ──
        (async function init() {
            console.log('🚀 Admin page loading...');
            const base64 = await loadLogoAsBase64();
            if (base64) {
                logoBase64 = base64;
                console.log('✅ Logo loaded as base64');
            } else {
                console.warn('⚠️ Logo not loaded, using text fallback');
            }
            await fetchData();
            console.log('✅ Initialisation complete');
        })();
    </script>
