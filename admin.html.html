<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - KT Interview Submissions</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Roboto, Arial, sans-serif;
      background: #eef2f7;
      padding: 24px;
    }
    .dashboard {
      max-width: 1400px;
      margin: 0 auto;
      background: white;
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.06);
    }
    h1 { display: flex; align-items: center; gap: 12px; color: #1a5276; font-size: 26px; margin-bottom: 20px; }
    .actions { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
    .actions button {
      background: #1a5276;
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      font-size: 14px;
    }
    .actions button:hover { background: #154360; transform: scale(1.02); }
    .actions button:active { transform: scale(0.97); }
    .actions .export { background: #1e8449; }
    .actions .export:hover { background: #196f3d; }
    .loading { text-align: center; padding: 40px; color: #5d6d7e; }
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      min-width: 1000px;
    }
    th {
      background: #1a5276;
      color: white;
      padding: 12px 10px;
      text-align: left;
      position: sticky;
      top: 0;
      z-index: 5;
    }
    td {
      padding: 10px;
      border-bottom: 1px solid #e5eaef;
      vertical-align: top;
    }
    tr:hover { background: #f4f8fc; }
    .btn-print {
      background: #2c3e50;
      color: white;
      border: none;
      padding: 5px 14px;
      border-radius: 30px;
      font-size: 12px;
      cursor: pointer;
    }
    .btn-print:hover { background: #1a2a3a; }
    .photo-thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; border: 1px solid #dce4ec; }
    
    /* ========== PERFECT PRINT LAYOUT ========== */
    @media print {
      body { background: white; padding: 0.5in; margin: 0; }
      .no-print { display: none !important; }
      .dashboard { box-shadow: none; border-radius: 0; padding: 0; max-width: 100%; }
      .print-biodata { display: block !important; }
      table { page-break-inside: avoid; }
      .print-biodata table { border-collapse: collapse; width: 100%; font-size: 12px; }
      .print-biodata td, .print-biodata th { border: 1px solid #000; padding: 6px 8px; text-align: left; vertical-align: top; }
      .print-biodata .header-table td { border: none; padding: 4px 8px; }
      .print-biodata .photo-cell { text-align: center; vertical-align: middle; }
      .print-biodata .photo-cell img { max-width: 120px; max-height: 140px; border: 2px solid #000; }
    }

    .print-biodata {
      display: none;
      max-width: 1000px;
      margin: 0 auto;
      padding: 0;
      font-family: 'Times New Roman', Times, serif;
      background: white;
      color: #000;
    }
    .print-biodata .header-table { width: 100%; border-collapse: collapse; border: 2px solid #000; }
    .print-biodata .header-table td { border: 1px solid #000; padding: 8px 12px; vertical-align: middle; }
    .print-biodata .logo-cell { width: 100px; text-align: center; }
    .print-biodata .logo-cell img { max-width: 80px; max-height: 80px; }
    .print-biodata .school-name { font-size: 22px; font-weight: 700; color: #1a5276; }
    .print-biodata .school-details { font-size: 13px; }
    .print-biodata .title-row { font-size: 18px; font-weight: 700; text-align: center; background: #eaf2f8; }
    .print-biodata .section-title { font-weight: 700; font-size: 15px; background: #d4e6f1; padding: 4px 8px; border: 1px solid #000; margin-top: 4px; }
    .print-biodata .field-row { display: flex; border-bottom: 1px dashed #ccc; padding: 3px 0; }
    .print-biodata .field-label { width: 30%; font-weight: 600; }
    .print-biodata .field-value { width: 70%; }
    .print-biodata .declaration { margin-top: 16px; border-top: 2px solid #000; padding-top: 12px; font-style: italic; }
    .print-biodata .signature-row { display: flex; justify-content: space-between; margin-top: 20px; }
  </style>
</head>
<body>
<div class="dashboard">
  <h1>📋 KT Global School – Interview Submissions</h1>
  <div class="actions no-print">
    <button onclick="fetchData()">🔄 Refresh</button>
    <button class="export" onclick="exportCSV()">📥 Export CSV</button>
    <button onclick="window.print()">🖨️ Print this page</button>
  </div>
  <div id="tableContainer">
    <div class="loading">⏳ Loading submissions...</div>
  </div>
</div>

<!-- Hidden container for printing single biodata -->
<div id="printContainer" class="print-biodata"></div>

<script>
  // REPLACE WITH YOUR ACTUAL APPS SCRIPT URL
  const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxScQIA8T-RI4i7zC09BStZFEmo7SQVvfxLTb0GK1WqqqsqJusDn_9hPKvLGz9zkQ5QPQ/exec";

  let allData = [];

  async function fetchData() {
    const container = document.getElementById('tableContainer');
    container.innerHTML = '<div class="loading">⏳ Loading...</div>';
    try {
      const response = await fetch(APP_SCRIPT_URL);
      const data = await response.json();
      allData = data;
      renderTable(data);
    } catch (e) {
      container.innerHTML = `<div style="color:#c0392b;padding:20px;">❌ Failed to fetch data. Check your Apps Script URL.<br>${e.message}</div>`;
    }
  }

  function renderTable(data) {
    const container = document.getElementById('tableContainer');
    if (!data || data.length === 0) {
      container.innerHTML = '<div style="padding:30px;text-align:center;color:#5d6d7e;">📭 No submissions yet.</div>';
      return;
    }

    let html = '<div class="table-wrap"><table><thead><tr>';
    const headers = Object.keys(data[0]);
    const displayHeaders = headers.filter(h => !['Permanent Address','Communication Address','Achievements','PhotoLink'].includes(h));
    displayHeaders.forEach(h => html += `<th>${h}</th>`);
    html += `<th>Photo</th><th>Action</th></tr></thead><tbody>`;

    data.forEach((row, idx) => {
      html += `<tr>`;
      displayHeaders.forEach(h => {
        let val = row[h] || '';
        if (val.length > 30) val = val.substring(0, 30) + '…';
        html += `<td>${val}</td>`;
      });
      const photoUrl = row['PhotoLink'] || '';
      html += `<td>${photoUrl ? `<img src="${photoUrl}" class="photo-thumb" alt="photo">` : '—'}</td>`;
      html += `<td><button class="btn-print" onclick="printBiodata(${idx})">🖨️ Print PDF</button></td>`;
      html += `</tr>`;
    });

    html += '</tbody></table></div>';
    container.innerHTML = html;
  }

  // ========== PERFECT PRINT BIODATA ==========
  function printBiodata(index) {
    const row = allData[index];
    if (!row) return;

    const container = document.getElementById('printContainer');
    // Use the school logo from the repo (change filename if needed)
    const logoHtml = `<img src="KTGS.jpeg" alt="KTGS Logo" style="max-width:80px;max-height:80px;" onerror="this.outerHTML='<div style=\\'font-size:40px;\\'>🏫</div>'">`;
    const photoHtml = row['PhotoLink'] ? `<img src="${row['PhotoLink']}" alt="Photo" style="max-width:120px;max-height:140px;border:2px solid #000;">` : '<div style="border:2px solid #000;width:120px;height:140px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#999;">No Photo</div>';

    container.innerHTML = `
      <!-- HEADER -->
      <table class="header-table">
        <tr>
          <td class="logo-cell" rowspan="2">${logoHtml}</td>
          <td style="text-align:center;">
            <div class="school-name">KT GLOBAL SCHOOL</div>
            <div class="school-details">📞 +91 90901 11177 &nbsp;|&nbsp; ✉ info@ktglobalschool.org</div>
            <div class="school-details">Plot No. F/12, IID Centre, Barunei, Khordha, Odisha - 752057</div>
          </td>
          <td class="photo-cell" rowspan="2" style="width:130px;text-align:center;vertical-align:middle;">
            ${photoHtml}
            <div style="font-size:10px;margin-top:4px;">Affix Passport Photo</div>
          </td>
        </tr>
        <tr>
          <td style="text-align:center;font-weight:700;font-size:18px;background:#eaf2f8;">INTERVIEW BIODATA FORM</td>
        </tr>
      </table>

      <!-- POST APPLIED -->
      <div style="margin-top:8px;font-weight:600;font-size:15px;">
        Post Applied For: <span style="font-weight:400;">${row['Post Applied'] || 'N/A'}</span>
      </div>

      <!-- 1. GENERAL INFORMATION -->
      <div class="section-title">1. General Information (Fill in CAPITAL LETTERS)</div>
      <div class="field-row"><span class="field-label">Name of Applicant:</span><span class="field-value">${row['Name']||''}</span></div>
      <div class="field-row"><span class="field-label">Father/Husband Name:</span><span class="field-value">${row['Father/Husband']||''}</span></div>
      <div class="field-row"><span class="field-label">D.O.B.:</span><span class="field-value">${row['DOB']||''}</span></div>
      <div class="field-row"><span class="field-label">Age (as on 1st Jan 2026):</span><span class="field-value">${row['Age']||''}</span></div>
      <div class="field-row"><span class="field-label">Category:</span><span class="field-value">${row['Category']||''}</span></div>
      <div class="field-row"><span class="field-label">Religion:</span><span class="field-value">${row['Religion']||''}</span></div>
      <div class="field-row"><span class="field-label">Nationality:</span><span class="field-value">${row['Nationality']||''}</span></div>
      <div class="field-row"><span class="field-label">Gender:</span><span class="field-value">${row['Gender']||''}</span></div>
      <div class="field-row"><span class="field-label">Marital Status:</span><span class="field-value">${row['Marital Status']||''}</span></div>
      <div class="field-row"><span class="field-label">Hobbies:</span><span class="field-value">${row['Hobbies']||''}</span></div>
      <div class="field-row"><span class="field-label">Permanent Address:</span><span class="field-value">${row['Permanent Address']||''}</span></div>
      <div class="field-row"><span class="field-label">Communication Address:</span><span class="field-value">${row['Communication Address']||''}</span></div>
      <div class="field-row"><span class="field-label">Mobile No.:</span><span class="field-value">${row['Mobile']||''}</span></div>
      <div class="field-row"><span class="field-label">E-mail ID:</span><span class="field-value">${row['Email']||''}</span></div>
      <div class="field-row"><span class="field-label">Aadhaar No.:</span><span class="field-value">${row['Aadhaar']||''}</span></div>
      <div class="field-row"><span class="field-label">PAN No.:</span><span class="field-value">${row['PAN']||''}</span></div>

      <!-- 2. EDUCATIONAL QUALIFICATIONS (TABLE) -->
      <div class="section-title">2. Educational Qualifications</div>
      <table style="width:100%;border-collapse:collapse;font-size:13px;margin-top:4px;">
        <tr style="background:#d4e6f1;font-weight:700;">
          <th style="border:1px solid #000;padding:4px;">Qualification</th>
          <th style="border:1px solid #000;padding:4px;">Year of Passing</th>
          <th style="border:1px solid #000;padding:4px;">Subjects Offered</th>
          <th style="border:1px solid #000;padding:4px;">Board/University</th>
          <th style="border:1px solid #000;padding:4px;">Marks %/CGPA</th>
        </tr>
        <tr><td style="border:1px solid #000;padding:4px;">Secondary</td><td style="border:1px solid #000;padding:4px;">${row['Secondary_Yr']||''}</td><td style="border:1px solid #000;padding:4px;">${row['Secondary_Subj']||''}</td><td style="border:1px solid #000;padding:4px;">${row['Secondary_Board']||''}</td><td style="border:1px solid #000;padding:4px;">${row['Secondary_Marks']||''}</td></tr>
        <tr><td style="border:1px solid #000;padding:4px;">Senior Secondary</td><td style="border:1px solid #000;padding:4px;">${row['SrSec_Yr']||''}</td><td style="border:1px solid #000;padding:4px;">${row['SrSec_Subj']||''}</td><td style="border:1px solid #000;padding:4px;">${row['SrSec_Board']||''}</td><td style="border:1px solid #000;padding:4px;">${row['SrSec_Marks']||''}</td></tr>
        <tr><td style="border:1px solid #000;padding:4px;">Graduation (Hons.)</td><td style="border:1px solid #000;padding:4px;">${row['Graduation_Yr']||''}</td><td style="border:1px solid #000;padding:4px;">${row['Graduation_Subj']||''}</td><td style="border:1px solid #000;padding:4px;">${row['Graduation_Board']||''}</td><td style="border:1px solid #000;padding:4px;">${row['Graduation_Marks']||''}</td></tr>
        <tr><td style="border:1px solid #000;padding:4px;">Post Graduation</td><td style="border:1px solid #000;padding:4px;">${row['PostGrad_Yr']||''}</td><td style="border:1px solid #000;padding:4px;">${row['PostGrad_Subj']||''}</td><td style="border:1px solid #000;padding:4px;">${row['PostGrad_Board']||''}</td><td style="border:1px solid #000;padding:4px;">${row['PostGrad_Marks']||''}</td></tr>
        <tr><td style="border:1px solid #000;padding:4px;">B.Ed./CT/NTT/B.P.Ed.</td><td style="border:1px solid #000;padding:4px;">${row['BEd_Yr']||''}</td><td style="border:1px solid #000;padding:4px;">${row['BEd_Subj']||''}</td><td style="border:1px solid #000;padding:4px;">${row['BEd_Board']||''}</td><td style="border:1px solid #000;padding:4px;">${row['BEd_Marks']||''}</td></tr>
        <tr><td style="border:1px solid #000;padding:4px;">OTET/CTET/OSTET</td><td style="border:1px solid #000;padding:4px;">${row['TET_Yr']||''}</td><td style="border:1px solid #000;padding:4px;">${row['TET_Subj']||''}</td><td style="border:1px solid #000;padding:4px;">${row['TET_Board']||''}</td><td style="border:1px solid #000;padding:4px;">${row['TET_Marks']||''}</td></tr>
      </table>

      <!-- 3. EXTRA QUALIFICATION -->
      <div class="section-title">3. Extra Qualification (if any)</div>
      <table style="width:100%;border-collapse:collapse;font-size:13px;margin-top:4px;">
        <tr style="background:#d4e6f1;font-weight:700;">
          <th style="border:1px solid #000;padding:4px;">Qualification</th>
          <th style="border:1px solid #000;padding:4px;">Specialization Subject</th>
          <th style="border:1px solid #000;padding:4px;">Year / University / Grade</th>
        </tr>
        <tr><td style="border:1px solid #000;padding:4px;">${row['Extra_Q1']||''}</td><td style="border:1px solid #000;padding:4px;">${row['Extra_Q2']||''}</td><td style="border:1px solid #000;padding:4px;">${row['Extra_Q3']||''}</td></tr>
      </table>

      <!-- 4. WORK EXPERIENCE -->
      <div class="section-title">4. Work Experience</div>
      <table style="width:100%;border-collapse:collapse;font-size:13px;margin-top:4px;">
        <tr style="background:#d4e6f1;font-weight:700;">
          <th style="border:1px solid #000;padding:4px;">School/Institution</th>
          <th style="border:1px solid #000;padding:4px;">Designation & Assignment</th>
          <th style="border:1px solid #000;padding:4px;">From</th>
          <th style="border:1px solid #000;padding:4px;">To</th>
          <th style="border:1px solid #000;padding:4px;">Subject/Class Taught</th>
          <th style="border:1px solid #000;padding:4px;">Gross Salary</th>
        </tr>
        <tr><td style="border:1px solid #000;padding:4px;">${row['WorkExp1']||''}</td><td style="border:1px solid #000;padding:4px;">${row['WorkExp2']||''}</td><td style="border:1px solid #000;padding:4px;"></td><td style="border:1px solid #000;padding:4px;"></td><td style="border:1px solid #000;padding:4px;"></td><td style="border:1px solid #000;padding:4px;"></td></tr>
      </table>
      <div style="margin-top:6px;">
        <span style="font-weight:600;">Total Experience (Years):</span> 
        Teaching: ${row['TotalTeaching']||0} &nbsp;|&nbsp; 
        Administrative: ${row['TotalAdmin']||0} &nbsp;|&nbsp; 
        Other: ${row['TotalOther']||0}
      </div>

      <!-- 5. ACHIEVEMENTS -->
      <div class="section-title">5. Achievements</div>
      <table style="width:100%;border-collapse:collapse;font-size:13px;margin-top:4px;">
        <tr style="background:#d4e6f1;font-weight:700;">
          <th style="border:1px solid #000;padding:4px;width:60px;">Sl. No.</th>
          <th style="border:1px solid #000;padding:4px;">Particular</th>
          <th style="border:1px solid #000;padding:4px;">Details Attached</th>
        </tr>
        <tr><td style="border:1px solid #000;padding:4px;">1</td><td style="border:1px solid #000;padding:4px;">Literary Activity</td><td style="border:1px solid #000;padding:4px;"></td></tr>
        <tr><td style="border:1px solid #000;padding:4px;">2</td><td style="border:1px solid #000;padding:4px;">Art & Craft</td><td style="border:1px solid #000;padding:4px;"></td></tr>
        <tr><td style="border:1px solid #000;padding:4px;">3</td><td style="border:1px solid #000;padding:4px;">Sports</td><td style="border:1px solid #000;padding:4px;"></td></tr>
        <tr><td style="border:1px solid #000;padding:4px;">4</td><td style="border:1px solid #000;padding:4px;">Cultural/Music/Dance</td><td style="border:1px solid #000;padding:4px;"></td></tr>
        <tr><td style="border:1px solid #000;padding:4px;" colspan="3"><span style="font-weight:600;">Other Achievements:</span> ${row['Achievements']||''}</td></tr>
      </table>

      <!-- 6. OTHER DETAILS -->
      <div class="section-title">6. Other Details</div>
      <div class="field-row"><span class="field-label">Minimum Salary Expected (Per Month):</span><span class="field-value">${row['ExpectedSalary']||''}</span></div>
      <div class="field-row"><span class="field-label">Time needed to join:</span><span class="field-value">${row['JoiningTime']||''}</span></div>
      <div class="field-row"><span class="field-label">Residential Status:</span><span class="field-value">${row['Residential']||''}</span></div>

      <!-- DECLARATION -->
      <div class="declaration">
        <p><strong>Declaration:</strong> I hereby declare that all the information furnished above is true to the best of my knowledge and belief. I will do all my duties to the best of my ability and follow the code of conduct of the institution maintaining required level of discipline as set by the institution.</p>
        <div class="signature-row">
          <span>Date: ${new Date(row['Timestamp']).toLocaleDateString('en-IN', { day:'2-digit', month:'2-digit', year:'numeric' })}</span>
          <span>Place: Khordha</span>
          <span>Full Signature of the Employee: _________________</span>
        </div>
      </div>
    `;

    // Open print dialog for this single record
    window.print();
  }

  // ========== EXPORT CSV ==========
  function exportCSV() {
    if (!allData || allData.length === 0) { alert('No data to export.'); return; }
    const headers = Object.keys(allData[0]);
    let csv = headers.join(',') + '\n';
    allData.forEach(row => {
      const values = headers.map(h => {
        let val = (row[h] || '').toString();
        if (val.includes(',') || val.includes('"') || val.includes('\n')) {
          val = '"' + val.replace(/"/g, '""') + '"';
        }
        return val;
      });
      csv += values.join(',') + '\n';
    });

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `KT_Submissions_${new Date().toISOString().slice(0,10)}.csv`;
    link.click();
    URL.revokeObjectURL(link.href);
  }

  window.onload = fetchData;
</script>
</body>
</html>
