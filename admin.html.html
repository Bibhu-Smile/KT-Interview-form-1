<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard – KT Interview Submissions</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/3.1.4/papaparse.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background: #eef2f7;
            padding: 24px;
        }
        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            padding: 28px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.06);
        }
        h1 { display: flex; align-items: center; gap: 12px; color: #1a5276; font-size: 26px; margin-bottom: 20px; }
        .actions { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
        .actions button {
            background: #1a5276;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 1000px;
        }
        th {
            background: #1a5276;
            color: white;
            padding: 12px 10px;
            text-align: left;
            position: sticky;
            top: 0;
            z-index: 5;
        }
        td {
            padding: 10px;
            border-bottom: 1px solid #e5eaef;
            vertical-align: top;
        }
        tr:hover { background: #f4f8fc; }
        .btn-print {
            background: #2c3e50;
            color: white;
            border: none;
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 12px;
            cursor: pointer;
        }
        .btn-print:hover { background: #1a2a3a; }
        .photo-thumb {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #dce4ec;
        }
        .resume-link { color: #1a5276; text-decoration: none; font-weight: 600; }
        .resume-link:hover { text-decoration: underline; }
        .error-box { color: #c0392b; padding: 20px; background: #fde8e8; border-radius: 8px; border-left: 4px solid #c0392b; margin: 20px 0; }
        .error-box code { background: #fff; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="dashboard" id="app">
        <h1>📋 KT Global School – Interview Submissions</h1>
        <div class="actions no-print">
            <button onclick="fetchData()">🔄 Refresh</button>
            <button class="export" onclick="exportCSV()">📥 Export CSV</button>
        </div>
        <div id="tableContainer">
            <div class="loading">⏳ Loading submissions...</div>
        </div>
    </div>

    <script>
        // ── CONFIGURATION ──
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTYGbGLv_LorKD3-SYVo4WhuZVT1L5yrrddirKk5mGcH6FeUlGrGVRbVPpKlcQ53O-4kkZhBRicMiN9/pub?output=csv';
        const LOGO_URL = 'kt-logo.webp';

        let allData = [];
        let logoBase64 = '';

        // ── Load logo as base64 ──
        async function loadLogoAsBase64() {
            try {
                const resp = await fetch(LOGO_URL);
                if (!resp.ok) throw new Error('Logo not found');
                const blob = await resp.blob();
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = reject;
                    reader.readAsDataURL(blob);
                });
            } catch (_) { return null; }
        }

        // ── CSV Parser ──
        function parseCSV(csvText) {
            const lines = csvText.split('\n').filter(line => line.trim() !== '');
            if (lines.length === 0) return [];
            const headers = lines[0].split(',').map(h => h.trim());
            const data = [];
            for (let i = 1; i < lines.length; i++) {
                const values = lines[i].split(',').map(v => v.trim());
                const obj = {};
                headers.forEach((h, idx) => obj[h] = values[idx] || '');
                data.push(obj);
            }
            return data;
        }

        // ── Fetch data ──
        async function fetchData() {
            const container = document.getElementById('tableContainer');
            container.innerHTML = '<div class="loading">⏳ Loading...</div>';
            try {
                const response = await fetch(CSV_URL);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const csvText = await response.text();
                const data = parseCSV(csvText);
                allData = data;
                console.log('✅ Data loaded:', data.length, 'rows');
                if (data.length === 0) {
                    container.innerHTML = '<div style="padding:30px;text-align:center;color:#5d6d7e;">📭 No submissions yet.</div>';
                    return;
                }
                renderTable(data);
            } catch (err) {
                console.error('Fetch error:', err);
                container.innerHTML = `<div class="error-box"><strong>❌ Error: ${err.message}</strong><br><code>${CSV_URL}</code></div>`;
            }
        }

        // ── Render table ──
        function renderTable(data) {
            const container = document.getElementById('tableContainer');
            const headers = Object.keys(data[0]);
            const hideCols = ['Permanent Address', 'Communication Address', 'Achievements'];
            const displayHeaders = headers.filter(h => !hideCols.includes(h));

            let html = '<div class="table-wrap"><table><thead><tr>';
            displayHeaders.forEach(h => html += `<th>${h}</th>`);
            html += `<th>Photo</th><th>Resume</th><th>Action</th></tr></thead><tbody>`;

            data.forEach((row, idx) => {
                html += `<tr>`;
                displayHeaders.forEach(h => {
                    let val = row[h] || '';
                    if (val.length > 30) val = val.substring(0, 30) + '…';
                    html += `<td>${val}</td>`;
                });
                const photoUrl = row['PhotoLink'] || '';
                html += `<td>${photoUrl ? `<img src="${photoUrl}" class="photo-thumb" alt="photo" crossorigin="anonymous" referrerpolicy="no-referrer">` : '—'}</td>`;
                const resumeUrl = row['ResumeLink'] || '';
                html += `<td>${resumeUrl ? `<a href="${resumeUrl}" target="_blank" class="resume-link">📄 View</a>` : '—'}</td>`;
                html += `<td><button class="btn-print" onclick="printBiodata(${idx})">🖨️ Print PDF</button></td>`;
                html += `</tr>`;
            });
            html += '</tbody></table></div>';
            container.innerHTML = html;
        }

        // ── NEW PRINT METHOD: open new window ──
        function printBiodata(index) {
            console.log('🔍 printBiodata called with index:', index);
            const row = allData[index];
            if (!row) {
                alert('Data not found. Please refresh the table.');
                return;
            }
            console.log('📄 Row data:', row);

            // Build the HTML for the biodata (same as before)
            const safe = (val) => val || '';

            // Logo: use base64 if available, else text fallback
            let logoHtml = '';
            if (logoBase64) {
                logoHtml = `<img src="${logoBase64}" alt="KTGS Logo" style="max-width:70px;max-height:70px;display:block;margin:0 auto;">`;
            } else {
                logoHtml = `<span style="font-size:32px;font-weight:700;color:#1a5276;">KTGS</span>`;
            }

            // Photo
            let photoHtml = '';
            const photoUrl = row['PhotoLink'] || '';
            if (photoUrl) {
                photoHtml = `<img src="${photoUrl}" alt="Passport Photo" style="max-width:100px;max-height:120px;border:2px solid #000;display:block;margin:0 auto;object-fit:contain;" onerror="this.outerHTML='<div style=\\'width:100px;height:120px;border:2px solid #000;display:flex;align-items:center;justify-content:center;font-size:10px;color:#999;background:#f9f9f9;margin:0 auto;\\'>📷<br>No Photo</div>'">`;
            } else {
                photoHtml = `<div style="width:100px;height:120px;border:2px solid #000;display:flex;align-items:center;justify-content:center;font-size:10px;color:#999;background:#f9f9f9;margin:0 auto;">📷<br>No Photo</div>`;
            }

            const name = safe(row['Name']);
            const father = safe(row['Father/Husband']);
            const dob = safe(row['DOB']);
            const age = safe(row['Age']);
            const bloodGroup = safe(row['Blood Group']);
            const category = safe(row['Category']);
            const religion = safe(row['Religion']);
            const nationality = safe(row['Nationality']);
            const gender = safe(row['Gender']);
            const marital = safe(row['Marital Status']);
            const hobbies = safe(row['Hobbies']);
            const permAddr = safe(row['Permanent Address']);
            const commAddr = safe(row['Communication Address']);
            const mobile = safe(row['Mobile']);
            const email = safe(row['Email']);
            const aadhaar = safe(row['Aadhaar']);
            const pan = safe(row['PAN']);

            const postCategory = safe(row['Post Category']);
            const postApplied = safe(row['Post Applied']);
            let displayPost = postApplied;
            if (postCategory) displayPost = postApplied + ' (' + postCategory + ')';

            const secYr = safe(row['Secondary_Yr']);
            const secSub = safe(row['Secondary_Subj']);
            const secBoard = safe(row['Secondary_Board']);
            const secMarks = safe(row['Secondary_Marks']);
            const srSecYr = safe(row['SrSec_Yr']);
            const srSecSub = safe(row['SrSec_Subj']);
            const srSecBoard = safe(row['SrSec_Board']);
            const srSecMarks = safe(row['SrSec_Marks']);
            const gradYr = safe(row['Graduation_Yr']);
            const gradSub = safe(row['Graduation_Subj']);
            const gradBoard = safe(row['Graduation_Board']);
            const gradMarks = safe(row['Graduation_Marks']);
            const pgYr = safe(row['PostGrad_Yr']);
            const pgSub = safe(row['PostGrad_Subj']);
            const pgBoard = safe(row['PostGrad_Board']);
            const pgMarks = safe(row['PostGrad_Marks']);
            const bedYr = safe(row['BEd_Yr']);
            const bedSub = safe(row['BEd_Subj']);
            const bedBoard = safe(row['BEd_Board']);
            const bedMarks = safe(row['BEd_Marks']);
            const tetYr = safe(row['TET_Yr']);
            const tetSub = safe(row['TET_Subj']);
            const tetBoard = safe(row['TET_Board']);
            const tetMarks = safe(row['TET_Marks']);

            const extra1 = safe(row['Extra_Q1']);
            const extra2 = safe(row['Extra_Q2']);
            const extra3 = safe(row['Extra_Q3']);

            const schools = (safe(row['WorkExp1']) || '').split(' || ');
            const desigs = (safe(row['WorkExp2']) || '').split(' || ');
            let workRowsHtml = '';
            for (let i = 0; i < 3; i++) {
                workRowsHtml += `<tr><td>${schools[i] || ''}</td><td>${desigs[i] || ''}</td><td></td><td></td><td></td><td></td></tr>`;
            }
            const teach = safe(row['TotalTeaching']);
            const admin = safe(row['TotalAdmin']);
            const other = safe(row['TotalOther']);
            const achievements = safe(row['Achievements']);
            const currentSalary = safe(row['CurrentSalary']);
            const salary = safe(row['ExpectedSalary']);
            const joining = safe(row['JoiningTime']);
            const transportation = safe(row['Transportation']);

            let formattedDate = '';
            if (row['Timestamp']) {
                try {
                    const d = new Date(row['Timestamp']);
                    formattedDate = d.toLocaleDateString('en-IN', { day:'2-digit', month:'2-digit', year:'numeric' });
                } catch (_) {}
            }

            // Build the complete HTML for the print window
            const printContent = `

                    .logo-cell { width: 12%; text-align: center; vertical-align: middle; }
                    .logo-cell img { max-width: 70px; max-height: 70px; display: block; margin: 0 auto; }

            </head>
            <body>

                    <div class="section-title">6. Salary & Other Details</div>
                    <div class="field-row"><span class="field-label">Current Salary (Rs. per month):</span><span class="field-value">${currentSalary || '___________'}</span></div>
                    <div class="field-row"><span class="field-label">Expected Salary Rs.</span><span class="field-value">${salary || '___________'} (Per Month)</span></div>
                    <div class="field-row"><span class="field-label">Time needed to join (days):</span><span class="field-value">${joining || '___________'}</span></div>
                    <div class="field-row"><span class="field-label">Transportation:</span><span class="field-value">${transportation || '___________'}</span></div>

                    <div class="declaration">
                        <p><strong>19. Declaration.</strong></p>
                        <p>I hereby declare that all the information furnished above is true to the best of my knowledge and belief. I will do all my duties to the best of my ability and follow the code of conduct of the institution maintaining required level of discipline as set by the institution.</p>
                        <div class="signature-row">
                            <span><strong>Date:</strong> ${formattedDate || '___________'}</span>
                            <span><strong>Place:</strong> Khordha</span>
                            <span><strong>Full Signature of the Employee:</strong> _________________</span>
                        </div>
                    </div>
                </div>
            </body>
            </html>
            `;

            // Open a new window and write the content
            const printWindow = window.open('', '_blank', 'width=800,height=600');
            if (!printWindow) {
                alert('Please allow pop-ups to print the biodata.');
                return;
            }
            printWindow.document.write(printContent);
            printWindow.document.close();
            // Wait for images to load then print
            setTimeout(() => {
                printWindow.focus();
                printWindow.print();
            }, 800);
        }

        // ── Export CSV ──
        function exportCSV() {
            if (!allData || allData.length === 0) { alert('No data to export.'); return; }
            const headers = Object.keys(allData[0]);
            let csv = headers.join(',') + '\n';
            allData.forEach(row => {
                const values = headers.map(h => {
                    let val = (row[h] || '').toString();
                    if (val.includes(',') || val.includes('"') || val.includes('\n')) {
                        val = '"' + val.replace(/"/g, '""') + '"';
                    }
                    return val;
                });
                csv += values.join(',') + '\n';
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `KT_Submissions_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
            URL.revokeObjectURL(link.href);
        }

        // ── INIT ──
        (async function init() {
            console.log('🚀 Admin page loading...');
            const base64 = await loadLogoAsBase64();
            if (base64) {
                logoBase64 = base64;
                console.log('✅ Logo loaded as base64');
            } else {
                console.warn('⚠️ Logo not loaded, using text fallback');
            }
            await fetchData();
            console.log('✅ Initialisation complete');
        })();
    </script>
